<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BS Mathematics Admin</title>

  <!-- Tailwind CSS (CDN) with forms + container-queries plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Typography: Newsreader (headlines) + Work Sans (body) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Work+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Material Symbols icon font (variable, FILL + weight axes) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />

  <!-- App-specific overrides (material-symbols variation, keyframes, minor utilities) -->
  <link href="assets/css/app.css" rel="stylesheet" />

  <!--
    Tailwind design-token config.
    Colours copied 1-to-1 from mock.html so all views share the same palette.
    WHY extend rather than replace? So we keep Tailwind's own stone/emerald
    shorthands alongside the semantic MD3 tokens.
  -->
  <script>
    // Guard: if CDN fails (offline), skip config so app doesn't crash
    // defer + DOMContentLoaded ensures this runs AFTER the CDN sets window.tailwind
    window.addEventListener('DOMContentLoaded', function () {
      if (typeof tailwind === 'undefined') {
        console.warn('[app] Tailwind CDN failed to load — styling may be degraded. Check network.');
        return;
      }
      tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            /* ── Primary (emerald green) ──────────────────── */
            'primary':                   '#006d36',
            'on-primary':                '#ffffff',
            'primary-container':         '#50c878',
            'on-primary-container':      '#005025',
            'primary-fixed':             '#83fba5',
            'primary-fixed-dim':         '#66dd8b',
            'on-primary-fixed':          '#00210c',
            'on-primary-fixed-variant':  '#005227',
            'inverse-primary':           '#66dd8b',
            'surface-tint':              '#006d36',
            /* ── Secondary (red accent) ───────────────────── */
            'secondary':                 '#b7131a',
            'on-secondary':              '#ffffff',
            'secondary-container':       '#db322f',
            'on-secondary-container':    '#fffbff',
            'secondary-fixed':           '#ffdad6',
            'secondary-fixed-dim':       '#ffb4ac',
            'on-secondary-fixed':        '#410002',
            'on-secondary-fixed-variant':'#93000d',
            /* ── Tertiary ─────────────────────────────────── */
            'tertiary':                  '#99443a',
            'on-tertiary':               '#ffffff',
            'tertiary-container':        '#ff9587',
            'on-tertiary-container':     '#782b23',
            'tertiary-fixed':            '#ffdad5',
            'tertiary-fixed-dim':        '#ffb4a9',
            'on-tertiary-fixed':         '#3f0302',
            'on-tertiary-fixed-variant': '#7b2e25',
            /* ── Error ────────────────────────────────────── */
            'error':                     '#ba1a1a',
            'on-error':                  '#ffffff',
            'error-container':           '#ffdad6',
            'on-error-container':        '#93000a',
            /* ── Neutral surfaces ─────────────────────────── */
            'background':                '#f9f9f8',
            'on-background':             '#1a1c1b',
            'surface':                   '#f9f9f8',
            'on-surface':                '#1a1c1b',
            'surface-variant':           '#e2e3e1',
            'on-surface-variant':        '#3e4a3f',
            'surface-container-lowest':  '#ffffff',
            'surface-container-low':     '#f3f4f2',
            'surface-container':         '#eeeeec',
            'surface-container-high':    '#e8e8e6',
            'surface-container-highest': '#e2e3e1',
            'surface-dim':               '#dadad8',
            'surface-bright':            '#f9f9f8',
            'inverse-surface':           '#2f3130',
            'inverse-on-surface':        '#f0f1ef',
            /* ── Outline ──────────────────────────────────── */
            'outline':                   '#6e7a6e',
            'outline-variant':           '#bdcabc',
          },
          borderRadius: {
            DEFAULT: '0.125rem',
            lg:      '0.25rem',
            xl:      '0.5rem',
            full:    '0.75rem',
          },
          fontFamily: {
            headline: ['Newsreader', 'serif'],
            body:     ['Work Sans', 'sans-serif'],
            label:    ['Work Sans', 'sans-serif'],
          },
        },
      };
    });
  </script>
</head>

<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">

  <!--
    #app — single mount point.
    Router replaces innerHTML with either views/login.html or views/shell.html.
  -->
  <div id="app">
    <!-- Bootstrap loading state — replaced by router on first navigation -->
    <div class="flex items-center justify-center min-h-screen">
      <span class="material-symbols-outlined text-emerald-600 text-5xl app-spinner">autorenew</span>
    </div>
  </div>

  <!--
    #toast-container — always present, lives above all content.
    Toasts are appended here by showToast() in app.js.
  -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <!-- Module entry point — deferred automatically by type="module" -->
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
