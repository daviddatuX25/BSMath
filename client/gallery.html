<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — BS Mathematics</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/client.css">
</head>
<body>
  <nav class="client-nav">
    <a href="index.html" class="brand">
      <div class="brand-logo">Σ</div>
      <span class="brand-text">BS Mathematics</span>
    </a>
    <a href="programs.html">Programs</a>
    <a href="announcements.html">Announcements</a>
    <a href="events.html">Events</a>
    <a href="news.html">News</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="faculty.html">Faculty</a>
  </nav>

  <div class="section-page">
    <h2>Gallery</h2>
    <div id="content" class="gallery-grid"></div>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox-modal" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
      <img id="lightbox-img" class="lightbox-image" src="" alt="Full image">
    </div>
  </div>

  <footer class="client-footer">
    &copy; 2026 BS Mathematics Department — College of Computing and Information Technology
  </footer>

  <script src="js/fetch-section.js"></script>
  <script>
    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { document.getElementById('lightbox-img').src = ''; }, 300);
    }

    fetchSection('../public_api/gallery_api.php', function(data) {

      return data.map(function(g) {
        return '<div class="gallery-item">' +
          '<img src="' + g.image_url + '" alt="' + (g.title || '') + '" onclick="openLightbox(\'' + g.image_url + '\')" onerror="this.src=\'https://placehold.co/400x200?text=Image+Not+Found&?font=roboto\'">' +
          '<div class="caption">' +
          (g.title ? '<h3>' + g.title + '</h3>' : '') +
          (g.description ? '<p>' + g.description + '</p>' : '') +
          '</div>' +
          '</div>';
      }).join('');
    });
  </script>
</body>
</html>
