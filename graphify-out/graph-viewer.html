<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSMath Knowledge Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e17; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
#controls {
  position: fixed; top: 12px; left: 12px; z-index: 10;
  background: rgba(16,20,32,0.92); border: 1px solid #2a3a5c; border-radius: 10px;
  padding: 14px 18px; width: 260px; backdrop-filter: blur(12px);
}
#controls h2 { font-size: 15px; color: #7eb8ff; margin-bottom: 8px; }
#controls label { font-size: 12px; color: #8899bb; display: block; margin-top: 6px; }
#controls input[type="text"], #controls select {
  width: 100%; padding: 5px 8px; border-radius: 5px; border: 1px solid #2a3a5c;
  background: #0d1220; color: #e0e0e0; font-size: 12px; margin-top: 3px;
}
#controls input[type="range"] { width: 100%; }
#stats { font-size: 11px; color: #6677aa; margin-top: 8px; line-height: 1.5; }
#tooltip {
  position: fixed; display: none; z-index: 20;
  background: rgba(10,14,23,0.96); border: 1px solid #3a5a8c; border-radius: 8px;
  padding: 10px 14px; max-width: 320px; font-size: 12px; pointer-events: none;
  backdrop-filter: blur(8px);
}
#tooltip .tt-label { font-weight: 700; color: #7eb8ff; font-size: 14px; }
#tooltip .tt-meta { color: #8899bb; margin-top: 4px; }
#legend {
  position: fixed; bottom: 12px; left: 12px; z-index: 10;
  background: rgba(16,20,32,0.88); border: 1px solid #2a3a5c; border-radius: 10px;
  padding: 10px 14px; max-height: 200px; overflow-y: auto; backdrop-filter: blur(12px);
}
#legend h3 { font-size: 12px; color: #7eb8ff; margin-bottom: 4px; }
.legend-item { font-size: 11px; display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
canvas { display: block; }
</style>
</head>
<body>
<div id="controls">
  <h2>BSMath Knowledge Graph</h2>
  <label>Search nodes</label>
  <input type="text" id="search" placeholder="e.g. login, get, renderPage">
  <label>Filter by community</label>
  <select id="communityFilter"><option value="-1">All communities</option></select>
  <label>Edge opacity <span id="edgeOpVal">0.25</span></label>
  <input type="range" id="edgeOpacity" min="0" max="1" step="0.05" value="0.25">
  <label>Repulsion <span id="repVal">300</span></label>
  <input type="range" id="repulsion" min="50" max="800" step="10" value="300">
  <div id="stats"></div>
</div>
<div id="tooltip"></div>
<div id="legend"></div>
<canvas id="canvas"></canvas>

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const statsEl = document.getElementById('stats');
const legendEl = document.getElementById('legend');

let W, H, nodes = [], links = [], nodeMap = {}, communities = {};
let hoverNode = null, selectedNode = null, dragNode = null;
let mouseX = 0, mouseY = 0;
let edgeOpacity = 0.25, repulsionForce = 300;
let searchQuery = '', communityFilter = -1;

// Color palette for communities
const palette = [
  '#4fc3f7','#7eb8ff','#81c784','#ffb74d','#f06292',
  '#ba68c8','#4db6ac','#ff8a65','#a1887f','#90a4ae',
  '#e57373','#64b5f6','#4dd0e1','#aed581','#ffd54f',
  '#ffab91','#ce93d8','#80cbc4','#fff176','#b0bec5',
  '#ef5350','#42a5f5','#26c6da','#9ccc65','#ffc107',
  '#ff7043','#ab47bc','#26a69a','#ffee58','#78909c',
  '#f44336','#2196f3','#00bcd4','#8bc34a','#ff9800',
  '#ff5722','#9c27b0','#009688','#ffeb3b','#607d8b'
];

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);

async function loadGraph() {
  const data = GRAPH_DATA;

  // Build node map
  data.nodes.forEach(n => {
    n.x = W/2 + (Math.random()-0.5)*200;
    n.y = H/2 + (Math.random()-0.5)*200;
    n.vx = 0; n.vy = 0;
    nodeMap[n.id] = n;
    if (n.community !== undefined) {
      if (!communities[n.community]) communities[n.community] = [];
      communities[n.community].push(n);
    }
  });
  nodes = data.nodes;
  links = data.links;

  // Populate community filter
  const sel = document.getElementById('communityFilter');
  const sorted = Object.keys(communities).map(Number).sort((a,b)=>a-b);
  sorted.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    const count = communities[c].length;
    opt.textContent = `Community ${c} (${count} nodes)`;
    sel.appendChild(opt);
  });

  // Build legend
  let legendHTML = '<h3>Communities</h3>';
  sorted.forEach(c => {
    const color = palette[c % palette.length];
    const count = communities[c].length;
    if (count < 3) return; // skip singletons
    const labels = communities[c].slice(0,3).map(n=>n.label).join(', ');
    legendHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${labels}${count>3?' +'+(count-3)+' more':''}</div>`;
  });
  legendEl.innerHTML = legendHTML;

  updateStats();
}

function updateStats() {
  const visible = nodes.filter(n => n.visible !== false);
  statsEl.innerHTML = `${visible.length} nodes / ${links.length} edges<br>${Object.keys(communities).length} communities`;
}

function getCommunityColor(c) {
  return palette[(c||0) % palette.length];
}

function isNodeVisible(n) {
  if (communityFilter >= 0 && n.community !== communityFilter) return false;
  if (searchQuery && !n.label.toLowerCase().includes(searchQuery.toLowerCase())) return false;
  return true;
}

function isLinkVisible(l) {
  const s = nodeMap[l.source];
  const t = nodeMap[l.target];
  return s && t && isNodeVisible(s) && isNodeVisible(t);
}

// Force simulation
function simulate() {
  const eps = 0.01;
  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    if (!isNodeVisible(nodes[i])) continue;
    for (let j = i+1; j < nodes.length; j++) {
      if (!isNodeVisible(nodes[j])) continue;
      let dx = nodes[j].x - nodes[i].x;
      let dy = nodes[j].y - nodes[i].y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = repulsionForce * repulsionForce / (dist * dist);
      nodes[i].vx -= force * dx / dist;
      nodes[i].vy -= force * dy / dist;
      nodes[j].vx += force * dx / dist;
      nodes[j].vy += force * dy / dist;
    }
  }
  // Attraction along edges
  const idealLen = 80;
  for (const l of links) {
    if (!isLinkVisible(l)) continue;
    const s = nodeMap[l.source]; const t = nodeMap[l.target];
    if (!s || !t) continue;
    let dx = t.x - s.x; let dy = t.y - s.y;
    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
    let force = (dist - idealLen) * 0.05;
    s.vx += force * dx / dist;
    s.vy += force * dy / dist;
    t.vx -= force * dx / dist;
    t.vy -= force * dy / dist;
  }
  // Center gravity
  for (const n of nodes) {
    if (!isNodeVisible(n)) continue;
    n.vx += (W/2 - n.x) * 0.001;
    n.vy += (H/2 - n.y) * 0.001;
    n.vx *= 0.85; n.vy *= 0.85;
    if (n === dragNode) continue;
    n.x += n.vx; n.y += n.vy;
  }
}

function draw() {
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, W, H);

  // Draw edges
  ctx.lineWidth = 1;
  for (const l of links) {
    if (!isLinkVisible(l)) continue;
    const s = nodeMap[l.source]; const t = nodeMap[l.target];
    if (!s || !t) continue;
    const isHighlighted = hoverNode && (hoverNode.id === s.id || hoverNode.id === t.id);
    const isSelected = selectedNode && (selectedNode.id === s.id || selectedNode.id === t.id);
    const alpha = isHighlighted || isSelected ? 0.8 : edgeOpacity;
    const color = l.confidence === 'INFERRED' ? `rgba(255,170,80,${alpha})` : `rgba(100,160,255,${alpha})`;
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.stroke();
    // Draw arrow for directed
    if (l.relation === 'calls' || l.relation === 'contains') {
      const angle = Math.atan2(t.y-s.y, t.x-s.x);
      const midX = (s.x+t.x)/2, midY = (s.y+t.y)/2;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(midX + 6*Math.cos(angle), midY + 6*Math.sin(angle));
      ctx.lineTo(midX + 6*Math.cos(angle + 2.5), midY + 6*Math.sin(angle + 2.5));
      ctx.lineTo(midX + 6*Math.cos(angle - 2.5), midY + 6*Math.sin(angle - 2.5));
      ctx.fill();
    }
  }

  // Draw nodes
  for (const n of nodes) {
    if (!isNodeVisible(n)) continue;
    const isHover = hoverNode && hoverNode.id === n.id;
    const isSelected = selectedNode && selectedNode.id === n.id;
    const isConn = hoverNode && links.some(l =>
      (l.source === hoverNode.id && l.target === n.id) ||
      (l.target === hoverNode.id && l.source === n.id)
    );
    const r = isHover || isSelected ? 10 : (isConn ? 8 : 5);

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = isHover || isSelected ? '#fff' :
                    isConn ? '#7eb8ff' :
                    getCommunityColor(n.community);
    ctx.fill();

    if (isHover || isSelected) {
      ctx.strokeStyle = '#7eb8ff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Label
      ctx.font = '13px Segoe UI';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y - 16);
    } else if (isConn) {
      ctx.font = '11px Segoe UI';
      ctx.fillStyle = '#aabbee';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y - 12);
    }
  }

  // Legend for edge types
  ctx.font = '11px Segoe UI';
  ctx.fillStyle = 'rgba(100,160,255,0.8)';
  ctx.fillText('--- EXTRACTED', 12, H - 28);
  ctx.fillStyle = 'rgba(255,170,80,0.8)';
  ctx.fillText('--- INFERRED', 12, H - 12);
}

function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}

// Mouse interaction
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (dragNode) {
    dragNode.x = mouseX; dragNode.y = mouseY;
    dragNode.vx = 0; dragNode.vy = 0;
    return;
  }
  hoverNode = null;
  for (const n of nodes) {
    if (!isNodeVisible(n)) continue;
    const dx = n.x - mouseX, dy = n.y - mouseY;
    if (dx*dx + dy*dy < 144) { hoverNode = n; break; }
  }
  if (hoverNode) {
    const connCount = links.filter(l => l.source === hoverNode.id || l.target === hoverNode.id).length;
    tooltip.style.display = 'block';
    tooltip.style.left = (mouseX + 16) + 'px';
    tooltip.style.top = (mouseY - 10) + 'px';
    tooltip.innerHTML = `<div class="tt-label">${hoverNode.label}</div>
      <div class="tt-meta">File: ${hoverNode.source_file || '?'}<br>
      Community: ${hoverNode.community}<br>
      Connections: ${connCount}<br>
      Type: ${hoverNode.file_type || 'code'}</div>`;
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mousedown', e => {
  if (hoverNode) {
    dragNode = hoverNode;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mouseup', () => {
  if (dragNode && dragNode !== hoverNode) {
    // Clicked on a different node — select it
  }
  dragNode = null;
  canvas.style.cursor = hoverNode ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  if (hoverNode) {
    selectedNode = selectedNode === hoverNode ? null : hoverNode;
  } else {
    selectedNode = null;
  }
});

// Controls
document.getElementById('edgeOpacity').addEventListener('input', e => {
  edgeOpacity = parseFloat(e.target.value);
  document.getElementById('edgeOpVal').textContent = edgeOpacity.toFixed(2);
});

document.getElementById('repulsion').addEventListener('input', e => {
  repulsionForce = parseInt(e.target.value);
  document.getElementById('repVal').textContent = repulsionForce;
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  updateStats();
});

document.getElementById('communityFilter').addEventListener('change', e => {
  communityFilter = parseInt(e.target.value);
  updateStats();
});

resize();
loadGraph().then(() => loop());
</script>
